<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <filter id="compassGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(200,200)" filter="url(#compassGlow)">

    <!-- Outer ring -->
    <circle r="170" fill="none" stroke="rgba(56,189,248,0.12)" stroke-width="1.5"/>
    <circle r="165" fill="none" stroke="rgba(56,189,248,0.06)" stroke-width="0.5"/>
    <circle r="155" fill="none" stroke="rgba(56,189,248,0.04)" stroke-width="0.5"/>

    <!-- Degree tick marks -->
    <g stroke="rgba(56,189,248,0.1)" stroke-width="0.8">
      <!-- Major ticks every 30° -->
      <line x1="0" y1="-170" x2="0" y2="-158" transform="rotate(0)"/>
      <line x1="0" y1="-170" x2="0" y2="-158" transform="rotate(30)"/>
      <line x1="0" y1="-170" x2="0" y2="-158" transform="rotate(60)"/>
      <line x1="0" y1="-170" x2="0" y2="-158" transform="rotate(90)"/>
      <line x1="0" y1="-170" x2="0" y2="-158" transform="rotate(120)"/>
      <line x1="0" y1="-170" x2="0" y2="-158" transform="rotate(150)"/>
      <line x1="0" y1="-170" x2="0" y2="-158" transform="rotate(180)"/>
      <line x1="0" y1="-170" x2="0" y2="-158" transform="rotate(210)"/>
      <line x1="0" y1="-170" x2="0" y2="-158" transform="rotate(240)"/>
      <line x1="0" y1="-170" x2="0" y2="-158" transform="rotate(270)"/>
      <line x1="0" y1="-170" x2="0" y2="-158" transform="rotate(300)"/>
      <line x1="0" y1="-170" x2="0" y2="-158" transform="rotate(330)"/>
    </g>
    <g stroke="rgba(56,189,248,0.06)" stroke-width="0.5">
      <!-- Minor ticks every 15° -->
      <line x1="0" y1="-170" x2="0" y2="-163" transform="rotate(15)"/>
      <line x1="0" y1="-170" x2="0" y2="-163" transform="rotate(45)"/>
      <line x1="0" y1="-170" x2="0" y2="-163" transform="rotate(75)"/>
      <line x1="0" y1="-170" x2="0" y2="-163" transform="rotate(105)"/>
      <line x1="0" y1="-170" x2="0" y2="-163" transform="rotate(135)"/>
      <line x1="0" y1="-170" x2="0" y2="-163" transform="rotate(165)"/>
      <line x1="0" y1="-170" x2="0" y2="-163" transform="rotate(195)"/>
      <line x1="0" y1="-170" x2="0" y2="-163" transform="rotate(225)"/>
      <line x1="0" y1="-170" x2="0" y2="-163" transform="rotate(255)"/>
      <line x1="0" y1="-170" x2="0" y2="-163" transform="rotate(285)"/>
      <line x1="0" y1="-170" x2="0" y2="-163" transform="rotate(315)"/>
      <line x1="0" y1="-170" x2="0" y2="-163" transform="rotate(345)"/>
    </g>

    <!-- Inner decorative ring -->
    <circle r="130" fill="none" stroke="rgba(56,189,248,0.06)" stroke-width="0.5"/>

    <!-- Cross hair lines (N-S, E-W, diagonals) -->
    <g stroke="rgba(56,189,248,0.04)" stroke-width="0.5">
      <line x1="0" y1="-130" x2="0" y2="130"/>
      <line x1="-130" y1="0" x2="130" y2="0"/>
      <line x1="-92" y1="-92" x2="92" y2="92"/>
      <line x1="92" y1="-92" x2="-92" y2="92"/>
    </g>

    <!-- North pointer (main) -->
    <polygon points="0,-140 -12,-30 0,-50 12,-30" fill="rgba(56,189,248,0.15)" stroke="rgba(56,189,248,0.2)" stroke-width="0.5"/>
    <!-- South pointer -->
    <polygon points="0,140 -12,30 0,50 12,30" fill="rgba(56,189,248,0.06)" stroke="rgba(56,189,248,0.1)" stroke-width="0.5"/>
    <!-- East pointer -->
    <polygon points="140,0 30,-12 50,0 30,12" fill="rgba(56,189,248,0.06)" stroke="rgba(56,189,248,0.1)" stroke-width="0.5"/>
    <!-- West pointer -->
    <polygon points="-140,0 -30,-12 -50,0 -30,12" fill="rgba(56,189,248,0.06)" stroke="rgba(56,189,248,0.1)" stroke-width="0.5"/>

    <!-- Diagonal pointers (NE, NW, SE, SW) -->
    <polygon points="95,-95 15,-22 30,-30 22,-15" fill="rgba(56,189,248,0.04)" stroke="rgba(56,189,248,0.07)" stroke-width="0.4"/>
    <polygon points="-95,-95 -15,-22 -30,-30 -22,-15" fill="rgba(56,189,248,0.04)" stroke="rgba(56,189,248,0.07)" stroke-width="0.4"/>
    <polygon points="95,95 15,22 30,30 22,15" fill="rgba(56,189,248,0.04)" stroke="rgba(56,189,248,0.07)" stroke-width="0.4"/>
    <polygon points="-95,95 -15,22 -30,30 -22,15" fill="rgba(56,189,248,0.04)" stroke="rgba(56,189,248,0.07)" stroke-width="0.4"/>

    <!-- Center decoration -->
    <circle r="6" fill="rgba(56,189,248,0.12)" stroke="rgba(56,189,248,0.18)" stroke-width="1"/>
    <circle r="2.5" fill="rgba(56,189,248,0.2)"/>

    <!-- Cardinal labels -->
    <text x="0" y="-148" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="600" fill="rgba(56,189,248,0.2)" letter-spacing="2">N</text>
    <text x="0" y="162" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="400" fill="rgba(56,189,248,0.1)" letter-spacing="2">S</text>
    <text x="156" y="5" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="400" fill="rgba(56,189,248,0.1)" letter-spacing="2">E</text>
    <text x="-156" y="5" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="400" fill="rgba(56,189,248,0.1)" letter-spacing="2">W</text>

    <!-- Intercardinal labels -->
    <text x="110" y="-108" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="rgba(56,189,248,0.07)">NE</text>
    <text x="-110" y="-108" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="rgba(56,189,248,0.07)">NW</text>
    <text x="110" y="118" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="rgba(56,189,248,0.07)">SE</text>
    <text x="-110" y="118" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="rgba(56,189,248,0.07)">SW</text>

    <!-- Slow rotation animation -->
    <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="300s" repeatCount="indefinite" additive="sum"/>
  </g>
</svg>
